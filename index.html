<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>솜솜시티: 은행 주의보 (프로토타입 M0.5)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#f3ede2; font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  #app { width:min(420px,100vw); position:relative; }
  canvas { display:block; width:100%; background:#fdfbf5; border-radius:12px; }
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:#fdfbf5; border-radius:12px; padding:20px; text-align:center; }
  .hidden { display:none; }
  h1 { font-size:26px; color:#5a4a3a; }
  .sub { color:#9a8b7a; font-size:13px; }
  button { border:2px solid #222; background:#fff; border-radius:10px; padding:10px 22px; font-size:16px; font-weight:700; cursor:pointer; box-shadow:2px 2px 0 #222; }
  button:active { transform:translate(2px,2px); box-shadow:none; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:100%; }
  .card { border:2px solid #222; border-radius:10px; background:#fff; padding:6px 4px; cursor:pointer; }
  .card img { width:100%; height:84px; object-fit:contain; }
  .card .nm { font-weight:800; font-size:13px; }
  .card .ab { font-size:10px; color:#7a6a5a; min-height:26px; }
  .card .bs { font-size:10px; color:#b08a3a; font-weight:700; }
  #title { overflow:hidden; justify-content:space-between; padding:34px 18px 26px; }
  #titleBg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  #titleTop, #startBtn { position:relative; z-index:1; }
  #titleLogo { font-size:30px; color:#5a4a3a;
    text-shadow:-2px -2px 0 #fdfbf5, 2px -2px 0 #fdfbf5, -2px 2px 0 #fdfbf5, 2px 2px 0 #fdfbf5, 0 3px 0 #fdfbf5; }
  #titleSub { font-size:13px; color:#7a6a5a; margin-top:8px;
    text-shadow:-1px -1px 0 #fdfbf5, 1px -1px 0 #fdfbf5, -1px 1px 0 #fdfbf5, 1px 1px 0 #fdfbf5; }
  #startBtn { font-size:19px; padding:13px 44px; background:#f6eed8; }
  #resultImg { height:130px; }
  #actionBtn { position:absolute; right:10px; bottom:10px; display:none; opacity:.92; }
  #muteBtn { position:absolute; top:46px; right:10px; display:none; opacity:.85; padding:5px 9px; font-size:13px; }
  .quote { font-size:14px; color:#5a4a3a; background:#f3ede2; border-radius:8px; padding:8px 12px; }
  #result { overflow:hidden; }
  #nameRow input { border:2px solid #222; border-radius:10px; padding:9px 12px; font-size:15px; width:130px; background:#fff; }
  .rankrow { display:flex; align-items:center; gap:10px; padding:7px 10px; border-bottom:1px dashed #d8cdb8; font-size:14px; color:#5a4a3a; text-align:left; }
  .rankrow img { width:34px; height:34px; object-fit:contain; mix-blend-mode:multiply; }
  .rankrow .rname { font-weight:800; flex:1; }
  .rankrow .rscore { font-weight:800; color:#b08a3a; }
  .rankrow.me { background:#f6eed8; border-radius:8px; }
  .confetti { position:absolute; top:-14px; width:10px; height:14px; border-radius:3px; animation:confFall 2.8s ease-in forwards; pointer-events:none; }
  @keyframes confFall { to { transform:translateY(760px) rotate(560deg); opacity:.15; } }
</style>
</head>
<body>
<div id="app">
  <canvas id="cv" width="420" height="680"></canvas>
  <button id="actionBtn">💨 대시</button>
  <button id="muteBtn">🔊</button>

  <div id="title" class="screen">
    <img id="titleBg" src="assets/title_main.png" onerror="this.onerror=null;this.src='assets/01_group_lineup.png';this.style.objectFit='contain';" alt="솜솜시티 친구들">
    <div id="titleTop">
      <h1 id="titleLogo">🍂 솜솜시티: 은행 주의보</h1>
      <div id="titleSub">가을이 왔다. 은행나무 골목을 무사히 버텨라!</div>
    </div>
    <button id="startBtn" onclick="ui.toSelect()">시작하기</button>
  </div>

  <div id="select" class="screen hidden">
    <h1>캐릭터 선택</h1>
    <div class="sub">←→ 이동 · 💨 대시(스페이스 / 모바일: 더블 터치)로 은행을 피하세요.<br>대시 거리는 캐릭터마다 다르고(끼토 최고) 대시 중엔 살짝 무적! · 북거씨는 대시 대신 쉘터 · 라칠친 할머니는 은행을 줍습니다</div>
    <div class="grid" id="charGrid"></div>
    <button onclick="ui.showRanking()">🏆 솜솜 랭킹</button>
  </div>

  <div id="ranking" class="screen hidden">
    <h1>🏆 솜솜 랭킹</h1>
    <div class="sub">전 세계 솜솜시티 주민들의 기록</div>
    <div id="rankList" style="width:100%;max-height:420px;overflow-y:auto;"></div>
    <button onclick="ui.toSelect()">닫기</button>
  </div>

  <div id="result" class="screen hidden">
    <h1 id="resTitle">결과</h1>
    <img id="resultImg" src="">
    <div class="quote" id="resQuote"></div>
    <div id="resScore" style="font-size:20px;font-weight:800;"></div>
    <div id="resDetail" class="sub"></div>
    <div id="resBest" class="sub"></div>
    <div id="nameRow" style="display:none;gap:8px;align-items:center;">
      <input id="nameInput" maxlength="8" placeholder="이름 (8자)">
      <button id="submitBtn" onclick="submitScore()">🏆 랭킹 등록</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <button onclick="ui.retry()">다시 도전</button>
      <button onclick="ui.toSelect()">캐릭터 변경</button>
      <button onclick="shareCard()">📸 자랑하기</button>
    </div>
  </div>
</div>

<script>
const CHARS = {
  kkito:      { name:'끼토',        img:'assets/02_kkito.png',      sd:'assets/sd_kkito.png',      speed:5.4, lives:1, w:52, h:60, dash:1.3, ability:'토끼 대시(최고) + 귀 레이더 경고', telegraph:true,
                intro:'가, 가스 불은 잠갔고... 좋아, 가보자!', hit:'으악! 괘, 괜찮아...!', record:'어?! 나 지금 잘하고 있는 거야?!', lose:'으아아! 귀 잡고 멘붕...' },
  boneul:     { name:'보늘',        img:'assets/03_boneul.png',     sd:'assets/sd_boneul.png',     speed:3.2, lives:2, w:66, h:64, dash:0.75, ability:'맷집: 피격 1회 무효 (대시는 짧음)',
                intro:'귀찮은데... 이기고 와서 피자 시켜야지.', hit:'아야. ...뭐, 한 대 정도야.', record:'오~ 신기록. 별거 아니네.', lose:'뭐, 죽기밖에 더 하겠냐. 피자 시킬까?' },
  migae:      { name:'미개',        img:'assets/04_migae.png',      sd:'assets/sd_migae.png',      speed:6.8, lives:1, w:40, h:42, dash:1.15, ability:'스피드: 빠르고 작음 (고수용)',
                intro:'뽈뽈뽈—! (의욕 충만)', hit:'뽈?! (더듬이가 꼬불해졌다)', record:'뽈뽈뽈뽈—!! (더듬이 하트)', lose:'(더듬이가 꼬불꼬불해졌다) 뽈뽈...' },
  ramda:      { name:'람다',        img:'assets/05_ramda.png',      sd:'assets/sd_ramda.png',      speed:5.4, lives:1, w:58, h:60, dash:1.05, ability:'줍줍 자석: 도토리가 끌려옴', magnet:120,
                intro:'떨어지는 도토리, 전부 내 거야!', hit:'앗 따가! 방금 거 환불해줘!', record:'이 기록 완전 희귀템이야!', lose:'방금 그 도토리 완전 희귀템이었는데!' },
  lachilchin: { name:'라칠친 할머니', img:'assets/06_lachilchin.png', sd:'assets/sd_lachilchin.png', speed:3.8, lives:1, w:50, h:58, dash:0.85, ability:'룰 반전: 은행=점수, 나뭇가지 주의!', flip:true,
                intro:'아이구, 은행 줍기엔 내가 선수지. 그래~', hit:'아이구야! 참말로~', record:'아이구, 늙은이가 또 해냈네 그래~', lose:'아이구, 그래~ 오늘은 이만 줍자.' },
  bookgeo:    { name:'북거씨',      img:'assets/07_bookgeo.png',    sd:'assets/sd_bookgeo.png',    speed:2.8, lives:1, w:70, h:52, hitScale:0.68, dash:0.6, ability:'등딱지 쉘터: 잠깐 무적 (쿨타임)', shell:true,
                intro:'서두르지 않아도, 이길 수 있어요.', hit:'음... 다음엔 등딱지로 막죠.', record:'천천히 왔는데, 어느새 신기록이네요.', lose:'천천히, 천천히... 다시 해봅시다.' },
};

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const W = 420, H = 680, GROUND = H - 34;
const DPR = Math.min(3, window.devicePixelRatio || 1);   // 레티나 대응 — 그래픽 깨짐 방지
cv.width = W * DPR; cv.height = H * DPR;

// 큰 원본을 한 번에 줄이면 계단 현상 → 절반씩 단계적 축소
function downscale(src, targetW) {
  let cur = src;
  while (cur.width / 2 > targetW) {
    const n = document.createElement('canvas');
    n.width = Math.max(1, (cur.width / 2) | 0); n.height = Math.max(1, (cur.height / 2) | 0);
    const x = n.getContext('2d');
    x.imageSmoothingEnabled = true; x.imageSmoothingQuality = 'high';
    x.drawImage(cur, 0, 0, n.width, n.height);
    cur = n;
  }
  return cur;
}

// ---------- sprites (SD 우선, 흰 배경 제거) ----------
const sprites = {}, fallbacks = {};
function keyOutWhiteBg(im) {
  const c = document.createElement('canvas');
  c.width = im.naturalWidth; c.height = im.naturalHeight;
  const x = c.getContext('2d'); x.drawImage(im, 0, 0);
  const d = x.getImageData(0, 0, c.width, c.height), p = d.data, w = c.width, h = c.height;
  const isWhite = i => p[i] > 228 && p[i+1] > 228 && p[i+2] > 228;
  const seen = new Uint8Array(w * h), q = [];
  for (let X = 0; X < w; X++) q.push(X, (h-1)*w + X);
  for (let Y = 0; Y < h; Y++) q.push(Y*w, Y*w + w - 1);
  while (q.length) {
    const n = q.pop();
    if (n < 0 || n >= w*h || seen[n]) continue;
    seen[n] = 1;
    if (!isWhite(n*4)) continue;
    p[n*4+3] = 0;
    const X = n % w;
    if (X > 0) q.push(n-1);
    if (X < w-1) q.push(n+1);
    q.push(n-w, n+w);
  }
  x.putImageData(d, 0, 0);
  return c;
}
for (const k in CHARS) {
  const sd = new Image(); sd.src = CHARS[k].sd;
  const target = CHARS[k].w * 1.7 * DPR * 1.4;            // 실제 표시 크기에 맞춰 축소 캐시
  sd.onload = () => { try { sprites[k] = downscale(keyOutWhiteBg(sd), target); } catch(e) { sprites[k] = sd; } };
  sd.onerror = () => {
    const im = new Image(); im.src = CHARS[k].img;
    im.onload = () => { try { sprites[k] = downscale(keyOutWhiteBg(im), target); } catch(e) { sprites[k] = im; } };
  };
  fallbacks[k] = sd;
}

// 표정 변형 SD (피격/승리) — 없으면 기본 스프라이트 폴백
const spritesFace = { hit: {}, win: {} };
for (const k in CHARS) {
  for (const f of ['hit', 'win']) {
    const im = new Image(); im.src = `assets/sd_${k}_${f}.png`;
    const target = CHARS[k].w * 1.7 * DPR * 1.4;
    im.onload = () => { try { spritesFace[f][k] = downscale(keyOutWhiteBg(im), target); } catch(e) { spritesFace[f][k] = im; } };
  }
}

// 배경 & 아이템 이미지 (없으면 코드 드로잉으로 폴백)
const bgImg = new Image(); let bgReady = false;
bgImg.src = 'assets/bg_alley.png';
bgImg.onload = () => { bgReady = true; };
const props = {};
for (const [pk, src, tw] of [['ginkgo','assets/prop_ginkgo.png',130], ['acorn','assets/prop_acorn.png',120], ['branch','assets/prop_branch.png',160]]) {
  const im = new Image(); im.src = src;
  im.onload = () => { try { props[pk] = downscale(keyOutWhiteBg(im), tw); } catch(e) {} };
}

const IS_TOUCH = matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;

// ---------- haptics (모바일 진동 — iOS 사파리는 미지원이라 무시됨) ----------
function buzz(pattern) {
  if (!IS_TOUCH || !navigator.vibrate) return;
  try { navigator.vibrate(pattern); } catch (e) {}
}
let state = null, raf = null, curKey = null;

function newState(key) {
  const c = CHARS[key];
  return {
    key, c, x: W/2, lives: c.lives, score: 0, t: 0, last: performance.now(),
    objs: [], warns: [], particles: [], floaters: [], stains: [], leaves: [],
    spawnAt: 0, dir: 0, hitFlash: 0, shake: 0, squash: 0, scorePop: 0,
    shellUntil: 0, shellCdUntil: 0, over: false, overAt: 0, hitstop: 0, moveT: 0,
    dashT: 0, dashCd: 0, dashDir: 1, lastDir: 1, introT: 1.8,
    bubble: null, recordShown: false, prevBest: +(localStorage.getItem('somsom2_best_' + key) || 0),
    acorns: 0, ginkgos: 0,
  };
}

const DASH_CD = 1.1;
function action() { const s = state; if (!s || s.over) return; s.c.shell ? useShell() : dash(); }
function dash() {
  const s = state; if (s.dashT > 0 || s.dashCd > 0) return;
  s.dashT = 0.16; s.dashCd = DASH_CD;
  s.dashDir = s.dir || s.lastDir;
  sfx('jump');
  burst(s, s.x - s.dashDir * 20, GROUND - 16, ['#d8c8a8', '#fff'], 6, 90, 25);   // 대시 먼지
}

// ---------- audio (WebAudio 합성 — 파일 없이 8bit풍 효과음) ----------
let AC = null, muted = localStorage.getItem('somsom_muted') === '1', bgmTimer = null, bgmStep = 0;
function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, dur, type, gain, when, slide) {
  const a = ac(), o = a.createOscillator(), g = a.createGain(), t0 = a.currentTime + (when || 0);
  o.type = type || 'square'; o.frequency.setValueAtTime(freq, t0);
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, t0 + dur);
  g.gain.setValueAtTime(gain || 0.08, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(a.destination); o.start(t0); o.stop(t0 + dur + 0.02);
}
function sfx(name) {
  if (muted) return;
  try {
    if (name === 'jump') tone(300, 0.14, 'square', 0.05, 0, 620);
    else if (name === 'land') tone(130, 0.07, 'triangle', 0.06);
    else if (name === 'coin') { tone(880, 0.07, 'square', 0.045); tone(1318, 0.1, 'square', 0.045, 0.06); }
    else if (name === 'ding') tone(660, 0.18, 'sine', 0.07, 0, 880);
    else if (name === 'thud') tone(180, 0.1, 'triangle', 0.08, 0, 90);
    else if (name === 'hit') { tone(220, 0.22, 'sawtooth', 0.08, 0, 70); tone(110, 0.25, 'square', 0.05, 0.02, 60); }
    else if (name === 'shell') tone(220, 0.25, 'sine', 0.06, 0, 330);
    else if (name === 'record') [523, 659, 784].forEach((f, i) => tone(f, 0.16, 'square', 0.05, i * 0.09));
    else if (name === 'gameover') [392, 311, 233].forEach((f, i) => tone(f, 0.25, 'triangle', 0.07, i * 0.18));
  } catch (e) {}
}
const BGM_NOTES = [392, 440, 523, 440, 587, 523, 440, 392, 523, 587, 659, 587, 523, 440, 392, 330];
function startBgm() {
  if (muted || bgmTimer) return;
  try { ac(); } catch (e) { return; }
  bgmTimer = setInterval(() => {
    if (muted || !state || state.over) return;
    tone(BGM_NOTES[bgmStep % BGM_NOTES.length], 0.32, 'triangle', 0.02);
    if (bgmStep % 2 === 0) tone(BGM_NOTES[bgmStep % BGM_NOTES.length] / 2, 0.4, 'sine', 0.012);
    bgmStep++;
  }, 280);
}
function stopBgm() { clearInterval(bgmTimer); bgmTimer = null; }
function showBubble(s, txt, dur) { if (txt) s.bubble = { txt, t: dur, max: dur }; }

// ---------- effects ----------
function burst(s, x, y, cols, n, spd, up) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, v = spd * (0.4 + Math.random() * 0.8);
    s.particles.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v - (up||0), g: 320,
      life: 0.55 + Math.random()*0.3, max: 0.8, size: 2.5 + Math.random()*3.5,
      col: cols[(Math.random()*cols.length)|0] });
  }
}
function stink(s, x, y) {     // 은행 냄새 연기
  for (let i = 0; i < 5; i++)
    s.particles.push({ x: x + (Math.random()-0.5)*16, y, vx: (Math.random()-0.5)*20, vy: -45 - Math.random()*35,
      g: -30, life: 0.9 + Math.random()*0.4, max: 1.2, size: 5 + Math.random()*4, col: 'rgba(150,170,90,0.55)' });
}
function floatTxt(s, x, y, txt, col) { s.floaters.push({ x, y, txt, col, life: 0.9 }); }

// ---------- spawn ----------
function spawn(s) {
  if (s.t < s.spawnAt) return;
  const interval = Math.max(0.20, 0.62 - s.t * 0.012);          // 난이도 ↑ (완만하게)
  s.spawnAt = s.t + interval;
  const make = () => {
    const x = 24 + Math.random() * (W - 48);
    const r = Math.random();
    let type;
    if (s.c.flip) type = r < 0.45 ? 'ginkgo' : (r < 0.80 ? 'branch' : 'acorn');
    else          type = r < 0.68 ? 'ginkgo' : 'acorn';
    const vy = (185 + s.t * 6.5 + Math.random() * 80) / 60;
    const vx = s.t > 18 ? (Math.random() - 0.5) * Math.min(1.8, s.t * 0.04) : 0;  // 후반 커브볼
    const obj = { type, x, y: -20, vy, vx };
    if (s.c.telegraph) s.warns.push({ x, t: 0.5, obj });
    else s.objs.push(obj);
  };
  make();
  if (Math.random() < Math.min(0.45, s.t * 0.010)) make();      // 후반 동시 투하
}

// ---------- draw helpers ----------
function drawGinkgo(x, y) {
  ctx.fillStyle = '#e8c14a'; ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x-7, y, 10, 0, 7); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+7, y+4, 10, 0, 7); ctx.fill(); ctx.stroke();
}
function drawAcorn(x, y) { ctx.font = '26px serif'; ctx.textAlign='center'; ctx.fillText('🌰', x, y+9); }
function drawBranch(x, y) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(0.5);
  ctx.fillStyle='#8a6a4a'; ctx.strokeStyle='#222';
  ctx.beginPath(); ctx.roundRect(-22,-5,44,10,5); ctx.fill(); ctx.stroke();
  ctx.restore();
}
function drawLeaf(x, y, r, a) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(r); ctx.globalAlpha = a;
  ctx.fillStyle = '#ecd06a';
  ctx.beginPath(); ctx.arc(0, 0, 6, 0.6, Math.PI - 0.6, false); ctx.lineTo(0, -7); ctx.closePath(); ctx.fill();
  ctx.restore(); ctx.globalAlpha = 1;
}

// ---------- loop ----------
function loop(now) {
  const s = state; if (!s) return;
  let dt = Math.min(0.05, (now - s.last) / 1000); s.last = now;
  if (s.over) dt *= 0.18;                                        // 게임오버 슬로모
  if (s.hitstop > 0) { s.hitstop -= dt; dt = 0; }
  if (s.introT > 0) { s.introT -= dt; }
  else {
    s.t += dt;
    if (!s.over) s.score += dt * 10;
  }
  if (s.bubble) { s.bubble.t -= dt; if (s.bubble.t <= 0) s.bubble = null; }
  if (!s.recordShown && s.prevBest > 0 && s.score > s.prevBest && !s.over) {   // 신기록 돌파 순간
    s.recordShown = true; showBubble(s, s.c.record, 1.6); sfx('record'); buzz([25, 50, 25, 50, 40]);
    burst(s, s.x, GROUND - s.c.h, ['#f3c14a','#fff','#e8915a'], 16, 160, 90);
  }

  // move (+대시)
  s.dashCd = Math.max(0, s.dashCd - dt);
  if (!s.over) {
    if (s.dir !== 0) s.lastDir = s.dir;
    if (s.dashT > 0) {
      s.dashT -= dt;
      s.x += s.dashDir * s.c.speed * 60 * 3.4 * s.c.dash * dt;
      if (Math.random() < 0.6) s.particles.push({ x: s.x - s.dashDir * 24, y: GROUND - 20 - Math.random() * 30, vx: -s.dashDir * 40, vy: -10, g: 0, life: 0.25, max: 0.25, size: 3.5, col: 'rgba(180,160,120,0.5)' });
    } else {
      s.x += s.dir * s.c.speed * 60 * dt;
    }
    s.x = Math.max(s.c.w/2, Math.min(W - s.c.w/2, s.x));
    if (s.dir !== 0) s.moveT += dt; else s.moveT = 0;
    if (s.introT <= 0) spawn(s);
  }

  for (const w of s.warns) { w.t -= dt; if (w.t <= 0) s.objs.push(w.obj); }
  s.warns = s.warns.filter(w => w.t > 0);

  // 람다 자석
  if (s.c.magnet) for (const o of s.objs) {
    if (o.type === 'acorn') {
      const dx = s.x - o.x, dy = (GROUND - 40) - o.y, d = Math.hypot(dx,dy) || 1;
      if (d < s.c.magnet) {
        o.x += dx/d * 170 * dt; o.y += dy/d * 170 * dt;
        if (Math.random() < 0.3) s.particles.push({ x:o.x, y:o.y, vx:0, vy:0, g:0, life:0.25, max:0.25, size:2, col:'#e8c14a' });
      }
    }
  }

  const px = s.x, py = GROUND - 6 - s.c.h/2, shell = (now < s.shellUntil) || s.dashT > 0;   // 대시 중 무적
  for (const o of s.objs) {
    o.y += o.vy * 60 * dt; o.x += (o.vx||0) * 60 * dt;
    if (o.x < 14 || o.x > W-14) o.vx = -(o.vx||0);
    const hs = s.c.hitScale || 1;                          // 덩치 큰 캐릭터 피탄 보정
    const rx = s.c.w * 0.38 * hs, ry = s.c.h * 0.42 * hs;
    if (!s.over && Math.abs(o.x - px) < rx + 13 && Math.abs(o.y - py) < ry + 13) {
      o.dead = true;
      const harmful = s.c.flip ? (o.type === 'branch') : (o.type === 'ginkgo');
      if (o.type === 'acorn') {
        s.score += 50; s.scorePop = 0.3; s.acorns++; sfx('coin'); buzz(15);
        burst(s, o.x, o.y, ['#b5824a','#e8c14a','#fff'], 10, 130, 60); floatTxt(s, o.x, o.y-12, '+50', '#b08a3a');
      } else if (s.c.flip && o.type === 'ginkgo') {
        s.score += 20; s.scorePop = 0.3; s.ginkgos++; sfx('ding'); buzz(12);
        burst(s, o.x, o.y, ['#e8c14a','#f3e29a'], 8, 110, 50); floatTxt(s, o.x, o.y-12, '+20 그래~', '#b08a3a');
      } else if (harmful) {
        if (shell) { floatTxt(s, px, py - s.c.h/2 - 14, '딱!', '#3a7a5a'); burst(s, o.x, o.y, ['#9ab87a'], 6, 90, 30); sfx('thud'); buzz(20); }
        else {
          s.lives--; s.hitFlash = 0.4; s.shake = 0.45; s.hitstop = 0.1; s.squash = 0.25;
          burst(s, o.x, o.y, o.type==='ginkgo' ? ['#e8c14a','#c9a23f'] : ['#8a6a4a','#6a4a2a'], 14, 170, 80);
          if (o.type === 'ginkgo') { stink(s, px, py - 10); floatTxt(s, px, py - s.c.h/2 - 16, '윽, 냄새!', '#d2452a'); }
          else floatTxt(s, px, py - s.c.h/2 - 16, '아이쿠!', '#d2452a');
          sfx('hit'); buzz(70);
          if (s.lives <= 0) { s.over = true; s.overAt = now; sfx('gameover'); stopBgm(); buzz([80, 60, 120]); }
          else showBubble(s, s.c.hit, 1.3);
        }
      }
    }
    // 바닥 얼룩
    if (o.y >= GROUND - 4 && !o.dead) {
      o.dead = true;
      if (o.type === 'ginkgo') { s.stains.push({ x: o.x, life: 3.5 }); if (Math.random()<0.4) stink(s, o.x, GROUND-8); }
      if (o.type === 'branch') burst(s, o.x, GROUND-6, ['#8a6a4a'], 4, 70, 40);
    }
  }
  s.objs = s.objs.filter(o => !o.dead && o.y < H + 30);

  // effects tick
  for (const p of s.particles) { p.life -= dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += p.g*dt; }
  s.particles = s.particles.filter(p => p.life > 0);
  for (const f of s.floaters) { f.life -= dt; f.y -= 36*dt; }
  s.floaters = s.floaters.filter(f => f.life > 0);
  for (const st of s.stains) st.life -= dt;
  s.stains = s.stains.filter(st => st.life > 0);
  if (s.leaves.length < 7 && Math.random() < 0.02)
    s.leaves.push({ x: Math.random()*W, y: -10, ph: Math.random()*7, r: Math.random()*7 });
  for (const l of s.leaves) { l.y += 28*dt; l.ph += dt*2; l.x += Math.sin(l.ph)*18*dt; l.r += dt; }
  s.leaves = s.leaves.filter(l => l.y < H+10);

  s.hitFlash = Math.max(0, s.hitFlash - dt); s.shake = Math.max(0, s.shake - dt);
  s.squash = Math.max(0, s.squash - dt); s.scorePop = Math.max(0, s.scorePop - dt);

  draw(s, now, shell);
  if (s.over && now - s.overAt > 700) return endGame();
  raf = requestAnimationFrame(loop);
}

function draw(s, now, shell) {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
  ctx.save();
  if (s.shake > 0) { const m = s.shake*3*8; ctx.translate((Math.random()-0.5)*m, (Math.random()-0.5)*m); }

  // bg
  if (bgReady) {
    const sc = Math.max((W+20) / bgImg.width, (H+20) / bgImg.height);
    const bw = bgImg.width * sc, bh = bgImg.height * sc;
    ctx.drawImage(bgImg, (W - bw)/2, (H - bh)/2, bw, bh);
  } else {
    ctx.fillStyle = '#fdfbf5'; ctx.fillRect(-10,-10,W+20,H+20);
    ctx.fillStyle = '#8a6a4a';
    ctx.fillRect(6, 40, 12, GROUND-40); ctx.fillRect(W-18, 40, 12, GROUND-40);
    ctx.fillStyle = '#f0d878';
    ctx.beginPath();
    for (let x = -10; x <= W+10; x += 42) ctx.arc(x, 18, 34, 0, Math.PI);
    ctx.fill();
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.2;
    ctx.beginPath(); for (let x = -10; x <= W+10; x += 42) ctx.arc(x, 18, 34, 0.15, Math.PI-0.15); ctx.stroke();
    ctx.fillStyle = '#efe6d2'; ctx.fillRect(-10, GROUND, W+20, H-GROUND+10);
    ctx.beginPath(); ctx.moveTo(-10,GROUND); ctx.lineTo(W+10,GROUND); ctx.stroke();
  }
  // 바닥 얼룩
  for (const st of s.stains) {
    ctx.globalAlpha = Math.min(0.5, st.life/3.5*0.5);
    ctx.fillStyle = '#d8b84a';
    ctx.beginPath(); ctx.ellipse(st.x, GROUND+6, 11, 4, 0, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // 떠다니는 낙엽
  for (const l of s.leaves) drawLeaf(l.x, l.y, l.r, 0.5);

  // 경고 (끼토)
  ctx.textAlign = 'center';
  for (const w of s.warns) {
    ctx.globalAlpha = 0.5 + 0.45*Math.sin(now/55);
    ctx.font = '700 22px sans-serif'; ctx.fillStyle = '#d2452a';
    ctx.fillText('!', w.x, 64);
    ctx.globalAlpha = 1;
  }

  // objects (생성 이미지 우선, 없으면 코드 드로잉)
  for (const o of s.objs) {
    const p = props[o.type];
    if (p) {
      const ow = o.type === 'branch' ? 50 : (o.type === 'ginkgo' ? 40 : 38);
      const oh = ow * p.height / p.width;
      ctx.save(); ctx.translate(o.x, o.y); ctx.rotate(((o.x*13)%10/10 - 0.5) * 0.7);
      ctx.drawImage(p, -ow/2, -oh/2, ow, oh);
      ctx.restore();
    }
    else if (o.type === 'ginkgo') drawGinkgo(o.x, o.y);
    else if (o.type === 'acorn') drawAcorn(o.x, o.y);
    else drawBranch(o.x, o.y);
  }

  // particles
  for (const p of s.particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // player
  let face = null;                                          // 표정 스왑
  if (s.hitFlash > 0 || s.over) face = 'hit';
  else if (s.bubble && s.bubble.txt === s.c.record) face = 'win';
  const im = (face && spritesFace[face][s.key]) || sprites[s.key] || fallbacks[s.key];
  const bob = (s.dir !== 0 && s.dashT <= 0) ? Math.sin(s.moveT*16) * 2.5 : 0;
  const sq = 1 - s.squash*0.5;
  const dw = s.c.w * 1.7, dh = s.c.h * 1.7 * sq;
  ctx.save();
  ctx.translate(s.x, GROUND - 4 + bob);
  ctx.rotate(s.dashT > 0 ? s.dashDir * 0.22 : s.dir * 0.12);
  if (s.hitFlash > 0 && Math.floor(now/60)%2===0) ctx.globalAlpha = 0.35;
  if (im && (im.width || im.naturalWidth)) ctx.drawImage(im, -dw/2, -dh, dw, dh);
  ctx.globalAlpha = 1;
  if (shell) {                                                   // 쉘터 돔
    ctx.strokeStyle = '#3a7a5a'; ctx.lineWidth = 3; ctx.globalAlpha = 0.7;
    ctx.beginPath(); ctx.arc(0, -dh/2, dw*0.72, 0, 7); ctx.stroke();
    ctx.globalAlpha = 0.12; ctx.fillStyle = '#3a7a5a';
    ctx.beginPath(); ctx.arc(0, -dh/2, dw*0.72, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  // 말풍선 (각오/피격/신기록 멘트)
  if (s.bubble) {
    const a = Math.min(1, s.bubble.t / 0.35);
    ctx.globalAlpha = a;
    ctx.font = '700 15px sans-serif';
    const txt = s.bubble.txt, tw = ctx.measureText(txt).width + 28;
    const bx = Math.max(10 + tw/2, Math.min(W - 10 - tw/2, s.x));
    const by = GROUND - s.c.h*1.7 - 78;
    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(bx - tw/2, by, tw, 40, 12); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s.x - 7, by + 39); ctx.lineTo(s.x + 7, by + 39); ctx.lineTo(s.x, by + 52); ctx.closePath();
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = '#222'; ctx.beginPath(); ctx.moveTo(s.x - 7, by + 40); ctx.lineTo(s.x, by + 52); ctx.lineTo(s.x + 7, by + 40); ctx.stroke();
    ctx.fillStyle = '#5a4a3a'; ctx.textAlign = 'center';
    ctx.fillText(txt, bx, by + 26);
    ctx.globalAlpha = 1;
  }

  // floaters
  for (const f of s.floaters) {
    ctx.globalAlpha = Math.min(1, f.life/0.4);
    ctx.font = '800 16px sans-serif'; ctx.fillStyle = f.col; ctx.textAlign = 'center';
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.strokeText(f.txt, f.x, f.y); ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;

  // HUD (흰 테두리로 캐노피 위에서도 또렷하게)
  const pop = 1 + s.scorePop * 1.2;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.lineJoin = 'round';
  ctx.fillStyle = '#5a4a3a'; ctx.textAlign = 'left';
  ctx.font = `800 ${Math.round(19*pop)}px sans-serif`;
  ctx.strokeText('점수 ' + Math.floor(s.score), 14, 31);
  ctx.fillText('점수 ' + Math.floor(s.score), 14, 31);
  ctx.font = '800 19px sans-serif'; ctx.textAlign = 'right';
  const hearts = '❤'.repeat(Math.max(0,s.lives));
  ctx.strokeText(hearts, W-14, 31); ctx.fillText(hearts, W-14, 31);
  {
    let txt;
    if (s.c.shell) {
      const cd = Math.max(0, (s.shellCdUntil - now)/1000);
      txt = cd > 0 ? '쉘터 ' + cd.toFixed(1) + 's' : '쉘터 준비됨';
    } else {
      txt = s.dashCd > 0 ? '대시 ' + s.dashCd.toFixed(1) + 's' : '대시 준비됨';
    }
    ctx.font = '700 12px sans-serif';
    ctx.strokeText(txt, W-14, 52); ctx.fillText(txt, W-14, 52);
  }

  // 피격 비네트
  if (s.hitFlash > 0) {
    const g = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.75);
    g.addColorStop(0, 'rgba(210,69,42,0)'); g.addColorStop(1, `rgba(210,69,42,${s.hitFlash*0.55})`);
    ctx.fillStyle = g; ctx.fillRect(-10,-10,W+20,H+20);
  }
  ctx.restore();
}

function useShell() {
  const s = state; if (!s || !s.c.shell || s.over) return;
  const now = performance.now();
  if (now < s.shellCdUntil) return;
  s.shellUntil = now + 1200; s.shellCdUntil = now + 5000;
  sfx('shell');
  floatTxt(s, s.x, GROUND - s.c.h*1.7 - 16, '쉘터!', '#3a7a5a');
}

const $ = id => document.getElementById(id);
const ui = {

  toSelect() { ui.show('select'); cancelAnimationFrame(raf); state = null; stopBgm(); $('actionBtn').style.display='none'; $('muteBtn').style.display='none'; },
  start(key) {

    $('muteBtn').style.display = 'block';
    showBubble(state, CHARS[key].intro, 1.8);
    startBgm();
    state.last = performance.now(); raf = requestAnimationFrame(loop);
  },
  retry() { ui.start(curKey); },
};

function endGame() {
  const s = state, c = s.c, score = Math.floor(s.score);
  const bk = 'somsom2_best_' + s.key, best = Math.max(score, +(localStorage.getItem(bk) || 0));
  localStorage.setItem(bk, best);
  $('resTitle').textContent = best === score && score > 0 ? '🎉 최고 기록!' : '게임 오버';
  const isNewBest = best === score && score > 0;
  const spr = (isNewBest ? spritesFace.win[s.key] : spritesFace.hit[s.key]) || sprites[s.key];
  $('resultImg').src = spr && spr.toDataURL ? spr.toDataURL() : c.img;
  $('resQuote').textContent = '"' + c.lose + '"';
  $('resScore').textContent = score + '점';
  $('resDetail').textContent = '생존 ' + s.t.toFixed(1) + '초 · 도토리 ' + s.acorns + '개' + (c.flip ? ' · 은행 ' + s.ginkgos + '개' : '');
  $('resBest').textContent = c.name + ' 최고기록: ' + best + '점';
  lastResult = { key: s.key, score, best, isNewBest, detail: $('resDetail').textContent };
  $('nameRow').style.display = (score >= 1 ? 'flex' : 'none');                 // 매 판 등록 가능 (랭킹은 이름당 최고점만 표시)
  $('nameInput').value = localStorage.getItem('somsom_name') || '';
  $('submitBtn').disabled = false; $('submitBtn').textContent = '🏆 랭킹 등록';
  // 신기록 콘페티
  document.querySelectorAll('#result .confetti').forEach(e => e.remove());
  if (isNewBest) {
    const cols = ['#e8c14a','#e8915a','#8a6fa8','#7fa05b','#d2452a','#375380'];
    for (let i = 0; i < 26; i++) {
      const sp = document.createElement('div');
      sp.className = 'confetti';
      sp.style.left = Math.random()*100 + '%';
      sp.style.background = cols[i % cols.length];
      sp.style.animationDelay = (Math.random()*0.9) + 's';
      $('result').appendChild(sp);
      setTimeout(() => sp.remove(), 4200);
    }
  }
  ui.show('result');
  buildGrid();
}

const FB_KEY = 'AIzaSyBfld7SRrVTxDG0nE_6Z3Mw5kSRTo5bIGY';   // 공개용 식별자 (비밀키 아님)
const FB_DOCS = 'https://firestore.googleapis.com/v1/projects/somsom-city/databases/(default)/documents';
async function lbGet() {
  try {
    const r = await fetch(FB_DOCS + ':runQuery?key=' + FB_KEY, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ structuredQuery: {
        from: [{ collectionId: 'scores' }],
        orderBy: [{ field: { fieldPath: 's' }, direction: 'DESCENDING' }],
        limit: 100 } }),
    });
    const j = await r.json();
    if (!r.ok || !Array.isArray(j)) return null;
    const all = j.filter(d => d.document).map(d => {
      const f = d.document.fields || {};
      return { n: (f.n && f.n.stringValue) || '?', c: (f.c && f.c.stringValue) || 'kkito', s: +((f.s && f.s.integerValue) || 0) };
    });
    const best = {};                                         // 이름+캐릭터 조합당 최고 기록 1개
    for (const e of all) { const k = e.n + '|' + e.c; if (!best[k] || e.s > best[k].s) best[k] = e; }
    return Object.values(best).sort((a, b) => b.s - a.s).slice(0, 10);
  } catch (e) { return null; }
}

        c: { stringValue: lastResult.key },

  sfx('record');
  ui.showRanking(null, name);
}

let lastResult = null;
async function shareCard() {
  if (!lastResult) return;
  const c = CHARS[lastResult.key];
  const SC = 2, cw = 420, ch = 560;
  const cv2 = document.createElement('canvas'); cv2.width = cw*SC; cv2.height = ch*SC;
  const x = cv2.getContext('2d'); x.scale(SC, SC);
  x.fillStyle = '#fdfbf5'; x.fillRect(0, 0, cw, ch);
  x.strokeStyle = '#222'; x.lineWidth = 3; x.strokeRect(10, 10, cw-20, ch-20);
  x.textAlign = 'center';
  x.fillStyle = '#5a4a3a'; x.font = '800 24px sans-serif';
  x.fillText('🍂 솜솜시티: 은행 주의보', cw/2, 56);
  const spr = (lastResult.isNewBest ? spritesFace.win[lastResult.key] : spritesFace.hit[lastResult.key]) || sprites[lastResult.key];
  if (spr) { const h = 200, w = h * spr.width / spr.height; x.drawImage(spr, cw/2 - w/2, 84, w, h); }
  x.font = '700 20px sans-serif'; x.fillText(c.name, cw/2, 318);
  x.font = '800 46px sans-serif'; x.fillStyle = '#b08a3a'; x.fillText(lastResult.score + '점', cw/2, 372);
  if (lastResult.isNewBest) { x.font = '800 18px sans-serif'; x.fillStyle = '#d2452a'; x.fillText('🎉 신기록 달성!', cw/2, 402); }
  x.font = '14px sans-serif'; x.fillStyle = '#5a4a3a'; x.fillText(lastResult.detail, cw/2, 436);
  x.font = '13px sans-serif'; x.fillText('"' + c.lose + '"', cw/2, 466);
  x.font = '12px sans-serif'; x.fillStyle = '#9a8b7a';
  x.fillText('pang861209-rgb.github.io/somsom-city-game', cw/2, 524);
  const blob = await new Promise(r => cv2.toBlob(r, 'image/png'));
  const file = new File([blob], 'somsom_score.png', { type: 'image/png' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], title: '솜솜시티: 은행 주의보' }); return; } catch (e) {}
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'somsom_score.png'; a.click();
}

function buildGrid() {
  const g = $('charGrid'); g.innerHTML = '';
  for (const k in CHARS) {
    const c = CHARS[k], best = localStorage.getItem('somsom2_best_' + k) || 0;
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `<img src="${c.sd}" onerror="this.src='${c.img}'" alt="${c.name}"><div class="nm">${c.name}</div><div class="ab">${c.ability}</div><div class="bs">BEST ${best}</div>`;
    d.onclick = () => ui.start(k);
    g.appendChild(d);
  }
}
buildGrid();

// ---------- input ----------
addEventListener('keydown', e => {
  if (!state) return;
  if (e.key === 'ArrowLeft') state.dir = -1;
  if (e.key === 'ArrowRight') state.dir = 1;
  if (e.key === 'ArrowUp') { e.preventDefault(); action(); }
  if (e.key === ' ') { e.preventDefault(); action(); }
});
addEventListener('keyup', e => {
  if (!state) return;
  if (e.key === 'ArrowLeft' && state.dir === -1) state.dir = 0;
  if (e.key === 'ArrowRight' && state.dir === 1) state.dir = 0;
});
function touchDir(e) {
  if (!state) return;
  const t = e.touches[0]; if (!t) { state.dir = 0; return; }
  const r = cv.getBoundingClientRect();
  state.dir = (t.clientX - r.left) < r.width/2 ? -1 : 1;
  e.preventDefault();
}
let lastTapT = 0;
cv.addEventListener('touchstart', e => {
  touchDir(e);
  const nowT = performance.now();                       // 더블 터치 = 대시/쉘터
  if (nowT - lastTapT < 300) action();
  lastTapT = nowT;
}, {passive:false});
cv.addEventListener('touchmove', touchDir, {passive:false});
cv.addEventListener('touchend', () => { if (state) state.dir = 0; });
$('actionBtn').addEventListener('click', action);
$('actionBtn').addEventListener('touchstart', e => { e.preventDefault(); action(); }, {passive:false});
$('muteBtn').textContent = muted ? '🔇' : '🔊';
$('muteBtn').addEventListener('click', () => {
  muted = !muted;
  localStorage.setItem('somsom_muted', muted ? '1' : '0');
  $('muteBtn').textContent = muted ? '🔇' : '🔊';
  if (muted) stopBgm(); else if (state && !state.over) startBgm();
});
</script>
